# CC Assistant Harness Configuration

version: "1.0"
project: "CC Assistant"
type: "intellij-platform-plugin"

# ============================================================
# 检查点定义 - 每个阶段必须通过这些验证才能继续
# ============================================================
checkpoints:

  # Phase 1: 项目初始化
  - id: cp-1-0-init
    name: "环境验证"
    description: "验证构建环境是否就绪"
    tasks:
      - verify-gradle-wrapper
      - verify-java-version
      - verify-kotlin-plugin
    gate:
      commands:
        - "gradlew --version"
        - "java -version"
      mustPass: true
    autoAdvance: true

  - id: cp-1-1-scaffold
    name: "脚手架验证"
    description: "验证项目基础结构"
    tasks:
      - verify-directory-structure
      - verify-plugin-xml
      - verify-main-source-files
    gate:
      commands:
        - "gradlew assemble"
        - "gradlew lintKotlin"
      mustPass: true
    autoAdvance: false

  # Phase 2: 核心模块
  - id: cp-2-0-service-layer
    name: "服务层实现"
    description: "实现核心服务层"
    tasks:
      - implement-demonbridge-service
      - implement-provider-service
      - implement-config-service
    gate:
      commands:
        - "gradlew compileKotlin"
        - "gradlew test --tests '*ServiceTest'"
      mustPass: true
      coverage: 70
    autoAdvance: false

  - id: cp-2-1-ui-layer
    name: "UI层实现"
    description: "实现UI组件层"
    tasks:
      - implement-chat-panel
      - implement-settings-dialog
      - implement-tool-window
    gate:
      commands:
        - "gradlew compileKotlin"
        - "gradlew runIdeForUiTests"
      mustPass: true
      coverage: 60
    autoAdvance: false

  # Phase 3: 功能集成
  - id: cp-3-0-daemon-bridge
    name: "Daemon桥接"
    description: "实现Node.js Daemon桥接"
    tasks:
      - implement-daemon-process-manager
      - implement-ndjson-parser
      - implement-message-callback
    gate:
      commands:
        - "gradlew compileKotlin"
        - "gradlew test --tests '*DaemonBridge*'"
      mustPass: true
    autoAdvance: false

  - id: cp-3-1-agent-sdk
    name: "Agent SDK集成"
    description: "集成Claude Agent SDK"
    tasks:
      - implement-sdk-loader
      - implement-persistent-query-service
      - implement-message-sender
    gate:
      commands:
        - "gradlew compileKotlin"
        - "node --check src/main/nodejs/daemon.js"
      mustPass: true
    autoAdvance: false

  # Phase 4: 端到端
  - id: cp-4-0-integration
    name: "集成测试"
    description: "完整功能集成验证"
    tasks:
      - integration-tests
      - manual-review-checklist
    gate:
      commands:
        - "gradlew check"
        - "gradlew build"
      mustPass: true
      coverage: 80
    autoAdvance: false

  - id: cp-4-1-release
    name: "发布验证"
    description: "发布前最终验证"
    tasks:
      - verify-changelog
      - verify-version-bump
      - verify-plugin-signing
    gate:
      commands:
        - "gradlew verifyPlugin"
        - "gradlew publishPlugin --dryrun"
      mustPass: true
    autoAdvance: false

# ============================================================
# 硬约束 - 违反则立即停止
# ============================================================
hard_constraints:
  - id: hc-001
    name: "编译必须通过"
    rule: "gradlew compileKotlin must succeed"
    severity: critical

  - id: hc-002
    name: "测试必须通过"
    rule: "gradlew test must succeed with 0 failures"
    severity: critical

  - id: hc-003
    name: "无敏感信息硬编码"
    rule: "no API keys, tokens, passwords in source code"
    severity: critical
    scanner: "ggshield"

  - id: hc-004
    name: "配置文件不得破坏向后兼容"
    rule: "config changes must be backward compatible"
    severity: critical

  - id: hc-005
    name: "plugin.xml 必须有效"
    rule: "plugin.xml must pass schema validation"
    severity: critical

# ============================================================
# 软约束 - 违反则警告
# ============================================================
soft_constraints:
  - id: sc-001
    name: "函数行数限制"
    rule: "no function > 50 lines"
    severity: warning

  - id: sc-002
    name: "模块循环依赖检查"
    rule: "no circular dependencies between modules"
    severity: warning
    scanner: "gradlew dependencies --configuration runtimeClasspath"

  - id: sc-003
    name: "公共API文档注释"
    rule: "all public APIs must have KDoc comments"
    severity: warning

  - id: sc-004
    name: "代码覆盖率"
    rule: "test coverage >= 70%"
    severity: warning

  - id: sc-005
    name: "禁止吞噬异常"
    rule: "no empty catch blocks or catch without handling"
    severity: warning

# ============================================================
# 任务模板
# ============================================================
task_templates:
  standard:
    description: "标准任务模板"
    steps:
      - read: "阅读相关现有代码，理解上下文"
      - plan: "制定实现计划，拆分 < 20 行的子任务"
      - implement: "实现代码"
      - test: "编写/更新单元测试"
      - verify: "运行验证脚本确保通过"
      - review: "人工 review（如适用）"
      - snapshot: "保存快照"

  bugfix:
    description: "Bug修复模板"
    steps:
      - reproduce: "复现问题，写下失败的测试"
      - diagnose: "定位根因"
      - fix: "修复代码"
      - verify: "确认测试通过"
      - snapshot: "保存快照"

  feature:
    description: "新功能模板"
    steps:
      - design: "设计 API 和数据结构"
      - review: "设计评审（如需要）"
      - implement: "分阶段实现"
      - test: "编写测试"
      - document: "更新文档"
      - snapshot: "保存快照"

# ============================================================
# 快照配置
# ============================================================
snapshot:
  enabled: true
  directory: "harness/snapshots"
  autoSaveOnCheckpoint: true
  maxSnapshots: 10
  include:
    - "src/"
    - "test/"
    - "harness/"
    - "build.gradle.kts"
    - "settings.gradle.kts"
  exclude:
    - "**/.gradle/**"
    - "**/build/**"
    - "**/.idea/**"
